name: Release GUI App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build-macos:
    name: Build macOS App (Apple Silicon)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller PySide6 Pillow
          pip install .

      - name: Build app
        run: python build_app.py --clean --target mac-arm64

      - name: Zip app bundle
        run: |
          cd dist
          APP_NAME="$(ls -d *.app | head -1)"
          ZIP_NAME="${APP_NAME%.app}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: AssetStudio-mac-arm64
          path: dist/AssetStudio-*-mac-arm64.zip
          retention-days: 1

  build-windows:
    name: Build Windows App (64-bit)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller PySide6 Pillow
          pip install .

      - name: Build app
        run: python build_app.py --clean --target win64

      - name: Zip output
        shell: pwsh
        run: |
          $folder = Get-ChildItem -Path dist -Directory | Where-Object { $_.Name -like "AssetStudio-*" } | Select-Object -First 1
          $zipName = "$($folder.Name).zip"
          Compress-Archive -Path "$($folder.FullName)\*" -DestinationPath "dist\$zipName"

      - uses: actions/upload-artifact@v4
        with:
          name: AssetStudio-win64
          path: dist/AssetStudio-*-win64.zip
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: AssetStudio ${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/AssetStudio-*-mac-arm64.zip
            artifacts/AssetStudio-*-win64.zip
